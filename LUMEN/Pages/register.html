<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Registration - LUMEN</title>
    
    <link rel="stylesheet" href="../css/mood-base.css">
    <link rel="stylesheet" href="../css/mood-default.css" id="fallbackMoodCSS">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--bg-primary);
        }
        .choice-container { width: 100%; max-width: 500px; margin: 0 auto; }
        .choice-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
        }
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
            color: var(--text-secondary);
        }
        .back-home:hover { transform: translateX(-3px); color: var(--accent); }
        .choice-icon { font-size: 3rem; color: var(--accent); margin-bottom: 1rem; }
        .choice-title { font-size: 1.8rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .choice-subtitle { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 2rem; }
        .choice-buttons { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        .choice-btn {
            padding: 1.2rem;
            border: 2px solid var(--card-border);
            border-radius: 1rem;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }
        .choice-btn:hover { border-color: var(--accent); transform: translateX(5px); background: rgba(102, 126, 234, 0.05); }
        .choice-btn-icon {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .choice-btn-content { flex: 1; }
        .choice-btn-title { font-size: 1.1rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.25rem; }
        .choice-btn-desc { font-size: 0.75rem; color: var(--text-secondary); }
        .login-link { text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); }
        .login-link p { font-size: 0.85rem; color: var(--text-secondary); }
        .login-link a { color: var(--accent); text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .choice-card { padding: 1.5rem; } .choice-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="choice-container">
        <div class="choice-card">
            <a href="../index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="choice-icon"><i class="fas fa-user-plus"></i></div>
            <h1 class="choice-title">Join LUMEN</h1>
            <p class="choice-subtitle">Choose how you want to register</p>
            
            <div class="choice-buttons">
                <button class="choice-btn" onclick="window.location.href='user-register.html'">
                    <div class="choice-btn-icon"><i class="fas fa-user"></i></div>
                    <div class="choice-btn-content">
                        <div class="choice-btn-title">User Registration</div>
                        <div class="choice-btn-desc">For regular users - Upload logs, view dashboard, get security solutions</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                </button>
                
                <button class="choice-btn" onclick="window.location.href='admin-register.html'">
                    <div class="choice-btn-icon"><i class="fas fa-user-shield"></i></div>
                    <div class="choice-btn-content">
                        <div class="choice-btn-title">Admin Registration</div>
                        <div class="choice-btn-desc">For administrators - Manage security rules, users, and premium requests</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                </button>
            </div>
            
            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/mood-storage.js"></script>
    <script src="../js/mood-selector.js"></script>
</body>
</html>
