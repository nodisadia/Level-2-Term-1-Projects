<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LUMEN</title>
    
    <!-- Base CSS -->
    <link rel="stylesheet" href="../css/mood-base.css">
    
    <!-- Fallback Mood CSS -->
    <link rel="stylesheet" href="../css/mood-default.css" id="fallbackMoodCSS">
    
    <!-- Forgot Password Page Specific CSS -->
    <link rel="stylesheet" href="forgot-password.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <a href="login.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
            
            <div class="forgot-logo">
                <div class="logo-icon">🛡️</div>
                <h1 class="logo-text">LUMEN</h1>
            </div>
            
            <div class="forgot-header">
                <h2 class="forgot-title">Forgot Password?</h2>
                <p class="forgot-subtitle">No worries! Enter your email and we'll send you an OTP to reset your password.</p>
            </div>
            
            <form id="forgotForm" class="forgot-form">
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" name="email" class="form-input" 
                           placeholder="e.g., john@example.com" required>
                </div>
                
                <button type="submit" id="sendOtpBtn" class="send-btn">
                    <i class="fas fa-paper-plane"></i> Send OTP
                </button>
            </form>
            
            <div class="login-link">
                <p>Remember your password? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/mood-storage.js"></script>
    <script src="../js/mood-selector.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
