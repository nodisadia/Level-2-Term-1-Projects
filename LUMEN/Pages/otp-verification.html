<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - LUMEN</title>
    
    <!-- Base CSS -->
    <link rel="stylesheet" href="../css/mood-base.css">
    
    <!-- Fallback Mood CSS -->
    <link rel="stylesheet" href="../css/mood-default.css" id="fallbackMoodCSS">
    
    <!-- OTP Page Specific CSS -->
    <link rel="stylesheet" href="otp-verification.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="otp-container">
        <div class="otp-card">
            <a href="forgot-password.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            
            <div class="otp-logo">
                <div class="logo-icon">🛡️</div>
                <h1 class="logo-text">LUMEN</h1>
            </div>
            
            <div class="otp-header">
                <h2 class="otp-title">OTP Verification</h2>
                <p class="otp-subtitle">Please enter the 6-digit code sent to your email</p>
            </div>
            
            <div class="otp-form">
                <div class="otp-input-group">
                    <input type="text" maxlength="1" class="otp-input" id="otp1" autofocus>
                    <input type="text" maxlength="1" class="otp-input" id="otp2">
                    <input type="text" maxlength="1" class="otp-input" id="otp3">
                    <input type="text" maxlength="1" class="otp-input" id="otp4">
                    <input type="text" maxlength="1" class="otp-input" id="otp5">
                    <input type="text" maxlength="1" class="otp-input" id="otp6">
                </div>
                
                <div class="timer-section">
                    <p id="timerText" class="timer-text">
                        <i class="fas fa-clock"></i> OTP expires in: <span id="timer">02:00</span>
                    </p>
                    <button id="resendBtn" class="resend-btn" disabled>
                        <i class="fas fa-redo-alt"></i> Resend OTP
                    </button>
                </div>
                
                <button id="verifyBtn" class="verify-btn">
                    <i class="fas fa-check-circle"></i> Verify OTP
                </button>
            </div>
            
            <div class="login-link">
                <p>Remember your password? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/mood-storage.js"></script>
    <script src="../js/mood-selector.js"></script>
    <script src="otp-verification.js"></script>
</body>
</html>
